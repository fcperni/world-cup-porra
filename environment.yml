# Dependencias para Streamlit in Snowflake (canal Anaconda de Snowflake).
# streamlit y snowflake-snowpark-python ya están disponibles en el entorno SiS.
# NO incluye PyGithub (no está en el canal y no se usa en Snowflake: la
# persistencia va a la tabla PORRA_RESULTS).
name: app_environment
channels:
  - snowflake
dependencies:
  - pandas
  - openpyxl
  - requests
  - beautifulsoup4
  - lxml
