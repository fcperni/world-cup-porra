# Dependencias para Streamlit in Snowflake (canal Anaconda de Snowflake).
# Incluye streamlit para que el archivo sirva también si Streamlit Community
# Cloud lo usara en lugar de requirements.txt (Streamlit es la opción principal;
# Snowflake, la alternativa). NO incluye PyGithub (no está en el canal y en
# Snowflake la persistencia va a la tabla PORRA_RESULTS).
name: app_environment
channels:
  - snowflake
dependencies:
  - streamlit
  - pandas
  - openpyxl
  - requests
  - beautifulsoup4
  - lxml
