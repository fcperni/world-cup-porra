[theme]
base = "dark"
primaryColor = "#c2f23c"
backgroundColor = "#0a0e13"
secondaryBackgroundColor = "#141c25"
textColor = "#eaf1f3"

# Fuentes cargadas de forma NATIVA por el tema (Google Fonts, formato "familia:url").
# Al ser parte del tema persistente evitan el parpadeo (FOUC) al cambiar de página.
font = "'Hanken Grotesk':https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
headingFont = "'Big Shoulders Display':https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&display=swap"
codeFont = "'Spline Sans Mono':https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500;600;700&display=swap"

[browser]
gatherUsageStats = false
