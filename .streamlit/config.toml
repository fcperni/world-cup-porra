[theme]
base = "dark"
primaryColor = "#c2f23c"
backgroundColor = "#0a0e13"
secondaryBackgroundColor = "#141c25"
textColor = "#eaf1f3"

# Fuente ÚNICA de toda la UI: Saira. Cargada de forma NATIVA por el tema (formato
# "familia:url"; sin comillas porque el nombre no tiene espacios). Se fijan TAMBIÉN
# headingFont y codeFont a Saira para que titulares y cifras sean Saira de forma
# persistente y NO parpadeen al cambiar de página (si no, los titulares usarían la
# fuente por defecto de Streamlit hasta que se aplicara el CSS).
font = "Saira:https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"
headingFont = "Saira:https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"
codeFont = "Saira:https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"

[browser]
gatherUsageStats = false

[server]
# Desactiva el vigilante de archivos: en navegación recargaba módulos y provocaba
# tanto un error de importación circular de pandas como la reinyección del CSS
# (parpadeo de fuente). No se necesita para usar la app (los cambios de código se
# aplican al reiniciar el servidor).
fileWatcherType = "none"
