[theme]
base = "dark"
primaryColor = "#c2f23c"
backgroundColor = "#0a0e13"
secondaryBackgroundColor = "#141c25"
textColor = "#eaf1f3"

# Fuente ÚNICA de toda la UI: Saira (familia técnica/deportiva con pesos 400-900
# y figuras tabulares). Cargada de forma nativa por el tema (evita el parpadeo).
# La jerarquía se logra con el peso, las mayúsculas y el interletraje; las cifras
# usan font-variant-numeric: tabular-nums (ver theme.py).
font = "'Saira':https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"
headingFont = "'Saira':https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"
codeFont = "'Saira':https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap"

[browser]
gatherUsageStats = false
